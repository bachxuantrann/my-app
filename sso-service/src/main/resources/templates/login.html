<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO - Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2>Hệ Sinh Thái SSO</h2>
            <p>Đăng nhập để truy cập vào các dịch vụ</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger text-center">
            Sai tài khoản/mật khẩu, hoặc tài khoản đã bị khóa!
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center">
            Bạn đã đăng xuất thành công.
        </div>

        <form th:action="@{/login-process}" method="post">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập của bạn" required autofocus/>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
            </div>
            
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <button type="submit" class="btn-primary">Đăng Nhập Ngay</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/register}">Tạo tài khoản mới</a>
            <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
        </div>
    </div>
</body>
</html>
