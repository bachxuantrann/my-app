<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO - Đăng ký tài khoản</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2>Tạo Tài Khoản Mới</h2>
            <p>Mở khóa sức mạnh của toàn bộ hệ sinh thái</p>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus/>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required/>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
            </div>

            <!-- Fake CSRF placeholder since logic may not be hooked up yet -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <button type="submit" class="btn-primary">Đăng Ký Tài Khoản</button>
        </form>

        <div class="auth-links text-center mt-3">
            <span style="color: var(--text-muted); font-size: 13px;">Đã có tài khoản?</span>
            <a th:href="@{/login}">Đăng nhập ngay</a>
        </div>
    </div>
</body>
</html>
