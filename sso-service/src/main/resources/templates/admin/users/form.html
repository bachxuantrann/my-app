<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${isEdit} ? 'SSO Admin - Sửa User' : 'SSO Admin - Thêm User'">SSO Admin - User Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>⚡ SSO Admin</h1>
        <div class="badge">Identity Provider Management</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Tổng Quan</div>
        <a th:href="@{/admin/dashboard}" class="nav-item">Dashboard</a>
        <div class="nav-section-title">Identity</div>
        <a th:href="@{/admin/users}" class="nav-item active">Quản Lý Người Dùng</a>
        <div class="nav-section-title">OAuth2</div>
        <a th:href="@{/admin/clients}" class="nav-item">Quản Lý Clients</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-link">Đăng Xuất</button>
        </form>
    </div>
</aside>

<div class="main-content">
    <header class="topbar">
        <span class="topbar-title" th:text="${isEdit} ? 'Chỉnh Sửa Người Dùng' : 'Thêm Người Dùng Mới'">User Form</span>
        <div class="topbar-right">
            <a th:href="@{/admin/users}" class="btn btn-outline">← Quay Lại</a>
        </div>
    </header>

    <div class="page-content">
        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

        <div class="card">
            <div class="card-header">
                <h3 th:text="${isEdit} ? 'Cập Nhật Thông Tin' : 'Tạo Tài Khoản Mới'"></h3>
            </div>
            <div class="card-body">
                <form th:action="${isEdit} ? @{/admin/users/{id}/edit(id=${user.id})} : @{/admin/users/new}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Tên Đăng Nhập *</label>
                            <input type="text" name="username" class="form-control"
                                   th:value="${user.username}" required
                                   th:readonly="${isEdit}" placeholder="username"/>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${user.email}" placeholder="email@example.com"/>
                        </div>
                        <div class="form-group" th:if="${!isEdit}">
                            <label>Mật Khẩu *</label>
                            <input type="password" name="password" class="form-control"
                                   required placeholder="••••••••" th:if="${!isEdit}"/>
                        </div>
                        <div class="form-group">
                            <label>Trạng Thái *</label>
                            <select name="status" class="form-control">
                                <option value="ACTIVE" th:selected="${user.status == 'ACTIVE'}">ACTIVE - Hoạt động</option>
                                <option value="INACTIVE" th:selected="${user.status == 'INACTIVE'}">INACTIVE - Vô hiệu</option>
                                <option value="DISABLED" th:selected="${user.status == 'DISABLED'}">DISABLED - Bị chặn</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Vai Trò *</label>
                            <select name="roleId" class="form-control">
                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${role.code + ' - ' + (role.description ?: role.code)}"
                                        th:selected="${user.roleId == role.id}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Cập Nhật' : 'Tạo Tài Khoản'">Submit</button>
                        <a th:href="@{/admin/users}" class="btn btn-outline">Hủy</a>
                        <div th:if="${isEdit}" style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
                            <form th:action="@{/admin/users/{id}/unlock(id=${user.id})}" method="post" th:if="${user.lockedUntil != null}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-success btn-sm">🔓 Mở Khóa</button>
                            </form>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
