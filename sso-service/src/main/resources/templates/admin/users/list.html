<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>SSO Admin - Người Dùng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>⚡ SSO Admin</h1>
        <div class="badge">Identity Provider Management</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Tổng Quan</div>
        <a th:href="@{/admin/dashboard}" class="nav-item">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>
        <div class="nav-section-title">Identity</div>
        <a th:href="@{/admin/users}" class="nav-item active">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            Quản Lý Người Dùng
        </a>
        <div class="nav-section-title">OAuth2</div>
        <a th:href="@{/admin/clients}" class="nav-item">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            Quản Lý Clients
        </a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-link">Đăng Xuất</button>
        </form>
    </div>
</aside>

<div class="main-content">
    <header class="topbar">
        <span class="topbar-title">Quản Lý Người Dùng</span>
        <div class="topbar-right">
            <a th:href="@{/admin/users/new}" class="btn btn-primary">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                Thêm Người Dùng
            </a>
        </div>
    </header>

    <div class="page-content">
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

        <div class="card">
            <div class="card-header">
                <h3>Danh Sách Người Dùng (<span th:text="${users.size()}">0</span>)</h3>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Trạng Thái</th>
                            <th>Role</th>
                            <th>Đăng Nhập Sai</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td style="color: var(--text-muted)" th:text="${user.id}"></td>
                            <td><strong th:text="${user.username}"></strong></td>
                            <td th:text="${user.email ?: '—'}"></td>
                            <td>
                                <span class="badge-pill"
                                      th:classappend="${user.status == 'ACTIVE'} ? 'badge-active' : (${user.lockedUntil != null} ? 'badge-locked' : 'badge-inactive')"
                                      th:text="${user.lockedUntil != null} ? 'LOCKED' : ${user.status}"></span>
                            </td>
                            <td>
                                <span class="badge-pill"
                                      th:classappend="${roleMap[user.roleId] == 'ADMIN'} ? 'badge-admin' : 'badge-inactive'"
                                      th:text="${roleMap[user.roleId] ?: '—'}"></span>
                            </td>
                            <td th:text="${user.failedLoginAttempts ?: 0}"></td>
                            <td style="display: flex; gap: 6px;">
                                <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-outline">Sửa</a>
                                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" onsubmit="return confirm('Xác nhận xóa?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${users.empty}">
                            <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px;">Chưa có người dùng nào</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
