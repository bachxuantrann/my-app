<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>SSO Admin - Clients</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <h1>⚡ SSO Admin</h1>
        <div class="badge">Identity Provider Management</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Tổng Quan</div>
        <a th:href="@{/admin/dashboard}" class="nav-item">Dashboard</a>
        <a th:href="@{/admin/audit-logs}" class="nav-item">Audit Logs</a>
        <div class="nav-section-title">Identity</div>
        <a th:href="@{/admin/users}" class="nav-item">Quản Lý Người Dùng</a>
        <div class="nav-section-title">OAuth2</div>
        <a th:href="@{/admin/clients}" class="nav-item active">Quản Lý Clients</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-link">Đăng Xuất</button>
        </form>
    </div>
</aside>

<div class="main-content">
    <header class="topbar">
        <span class="topbar-title">Quản Lý OAuth2 Clients</span>
        <div class="topbar-right">
            <a th:href="@{/admin/clients/new}" class="btn btn-primary">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                Đăng Ký Client Mới
            </a>
        </div>
    </header>

    <div class="page-content">
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

        <div class="card">
            <div class="card-header">
                <h3>Danh Sách Clients (<span th:text="${clients.size()}">0</span>)</h3>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Client ID</th>
                            <th>Client Name</th>
                            <th>Scopes</th>
                            <th>Grant Types</th>
                            <th>Redirect URIs</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="client : ${clients}">
                            <td style="color: var(--text-muted)" th:text="${client.id}"></td>
                            <td><code style="font-size: 12px; color: #a78bfa" th:text="${client.clientId}"></code></td>
                            <td><strong th:text="${client.clientName}"></strong></td>
                            <td>
                                <span th:each="scope : ${#strings.arraySplit(client.scopes, ',')}"
                                      class="badge-pill badge-inactive"
                                      style="margin-right: 3px; font-family: monospace"
                                      th:text="${#strings.trim(scope)}"></span>
                            </td>
                            <td style="font-size: 12px; color: var(--text-muted)" th:text="${client.authorizationGrantTypes}"></td>
                            <td style="font-size: 12px; color: var(--text-muted); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:text="${client.redirectUris}"></td>
                            <td style="display: flex; gap: 6px;">
                                <a th:href="@{/admin/clients/{id}/edit(id=${client.id})}" class="btn btn-sm btn-outline">Sửa</a>
                                <form th:action="@{/admin/clients/{id}/delete(id=${client.id})}" method="post" onsubmit="return confirm('Xác nhận xóa Client này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${clients.empty}">
                            <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px;">Chưa có Client nào được đăng ký</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
