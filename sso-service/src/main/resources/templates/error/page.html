<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lỗi <span th:text="${status}"></span> - SSO Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0a0f1e;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(239, 68, 68, 0.08) 0%, transparent 50%);
        }
        .error-container {
            text-align: center;
            max-width: 520px;
            padding: 48px 40px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .error-status {
            font-size: 88px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #f87171, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .error-code-badge {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: #f87171;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 22px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 8px;
        }
        .error-uri {
            font-size: 12px;
            font-family: monospace;
            color: #475569;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 32px;
        }
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-error-back {
            padding: 10px 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn-error-back:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-error-secondary {
            padding: 10px 20px;
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .btn-error-secondary:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
        .error-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#f87171" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.07 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
    </div>
    <div class="error-status" th:text="${status}">500</div>
    <div class="error-code-badge" th:text="${errorCode}">INTERNAL_ERROR</div>
    <div class="error-title">Đã xảy ra sự cố</div>
    <p class="error-message" th:text="${message}">Đã xảy ra lỗi không mong muốn. Vui lòng thử lại sau.</p>
    <div class="error-uri" th:if="${requestUri}" th:text="${requestUri}"></div>
    <div class="error-actions">
        <a href="javascript:history.back()" class="btn-error-back">← Quay lại</a>
        <a th:href="@{/admin/dashboard}" class="btn-error-secondary">Dashboard</a>
    </div>
</div>
</body>
</html>
