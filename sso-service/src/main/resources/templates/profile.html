<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>SSO - Tài Khoản Của Tôi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <style>
        .profile-card {
            max-width: 450px;
            margin: 60px auto;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(20px);
        }
        .profile-avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: white;
            margin: 0 auto 20px;
        }
        .profile-info { margin: 20px 0; }
        .info-row {
            display: flex; justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(148,163,184,0.08);
            font-size: 14px;
        }
        .info-label { color: var(--text-muted); }
        .info-value { color: var(--text-main); font-weight: 500; }
        .logout-btn {
            display: block; width: 100%; margin-top: 24px;
            padding: 12px; border: none; border-radius: 10px;
            background: rgba(239,68,68,0.12); color: #f87171;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="profile-avatar"
             th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}">U</div>
        <div class="auth-header" style="margin-bottom: 0;">
            <h2 style="font-size: 20px" th:text="${username}">username</h2>
            <p>Tài Khoản Người Dùng</p>
        </div>

        <div class="profile-info">
            <div class="info-row">
                <span class="info-label">Tên đăng nhập</span>
                <span class="info-value" th:text="${username}"></span>
            </div>
            <div class="info-row" th:if="${email}">
                <span class="info-label">Email</span>
                <span class="info-value" th:text="${email}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Vai trò</span>
                <span class="info-value" style="color: #818cf8">USER</span>
            </div>
        </div>

        <p style="font-size: 12px; color: var(--text-muted); margin-top: 20px; text-align: center;">
            Để truy cập các ứng dụng, hãy đăng nhập từ app client của bạn.
        </p>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">Đăng Xuất</button>
        </form>
    </div>
</body>
</html>
