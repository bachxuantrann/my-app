<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO - Quên mật khẩu</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2>Khôi Phục Mật Khẩu</h2>
            <p>Nhập email đã đăng ký của bạn để nhận liên kết khôi phục</p>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label>Địa chỉ Email</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required autofocus/>
            </div>

            <!-- Fake CSRF placeholder -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <button type="submit" class="btn-primary">Gửi Liên Kết Đặt Lại</button>
        </form>

        <div class="auth-links text-center mt-3" style="display: block;">
            <a th:href="@{/login}">Quay lại trang Đăng nhập</a>
        </div>
    </div>
</body>
</html>
